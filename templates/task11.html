{% extends "base_dashboard.html" %}

{% block title %}Reading Task - Dyslexia Research Study{% endblock %}

{% block content %}
<!-- TASK_MAIN_CONTENT -->
<!-- Video Monitor UI (Fixed on Desktop, Relative on Mobile) -->
<div
    class="lg:fixed lg:top-24 lg:right-6 lg:w-72 lg:z-50 lg:mb-0 relative w-full max-w-sm mx-auto mb-6 bg-black rounded-xl overflow-hidden shadow-lg border border-gray-700">
    <!-- Video Preview -->
    <video id="videoPreview" autoplay muted playsinline
        class="w-full h-48 object-cover transform scale-x-[-1] bg-gray-900"></video>

    <!-- Controls Overlay -->
    <div class="absolute bottom-4 left-0 right-0 flex justify-center space-x-4 z-10">
        <!-- Mic Toggle -->
        <button id="toggleMicBtn"
            class="p-3 rounded-full bg-gray-700 hover:bg-gray-600 text-white transition focus:outline-none shadow-md"
            title="Toggle Microphone">
            <svg id="micIconOn" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
            <svg id="micIconOff" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden text-red-500" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" />
            </svg>
        </button>

        <!-- Camera Toggle -->
        <button id="toggleCamBtn"
            class="p-3 rounded-full bg-gray-700 hover:bg-gray-600 text-white transition focus:outline-none shadow-md"
            title="Toggle Camera">
            <svg id="camIconOn" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
            <svg id="camIconOff" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden text-red-500" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" />
            </svg>
        </button>
    </div>
</div>
<div class="content-wrapper flex justify-center items-center min-h-[60vh] bg-transparent my-4 md:my-8 lg:my-16 px-4">
    <div
        class="w-full max-w-xl md:max-w-2xl lg:max-w-4xl bg-white rounded-xl md:rounded-2xl shadow-lg p-4 md:p-6 lg:p-8 flex flex-col items-center border border-gray-200">


        <div class="flex items-center gap-2 md:gap-4 mb-3 md:mb-4">
            <img src="{{ url_for('static', filename='read.png') }}" alt="Reading Aloud"
                class="w-12 h-12 md:w-16 md:h-16 object-cover rounded-lg md:rounded-xl shadow-md">
            <h2 class="text-lg md:text-2xl font-bold text-[#1A237E]">Read Aloud Task</h2>
        </div>

        <div class="mb-3 md:mb-4 w-full bg-blue-50 rounded p-3 md:p-4 border border-blue-100">
            <div id="readingContent" class="mt-2 text-gray-800 text-sm md:text-base lg:text-lg">
                <!-- Dynamic content will be loaded here -->
                <div class="text-center py-8">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                    <p class="mt-2 text-gray-600">Loading reading content...</p>
                </div>
            </div>
        </div>
        <div class="flex flex-col items-center w-full mb-3 md:mb-4">
            <div id="recorder-visual" class="mb-2 flex items-center justify-center">
                <div id="recording-dot" class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-red-500 mr-2 hidden animate-pulse">
                </div>
                <span id="recStatus" class="text-gray-700 text-xs md:text-sm lg:text-base"></span>
            </div>
            <div class="flex flex-wrap justify-center gap-2 md:gap-3 mb-2">
                <button id="recordBtn"
                    class="primary-bg text-white px-3 py-2 md:px-4 md:py-2 rounded text-sm md:text-base font-semibold transition">Record</button>
                <button id="stopBtn"
                    class="bg-gray-300 text-gray-800 px-3 py-2 md:px-4 md:py-2 rounded text-sm md:text-base font-semibold transition"
                    disabled>Stop</button>
                <button id="playBtn"
                    class="bg-green-600 text-white px-3 py-2 md:px-4 md:py-2 rounded text-sm md:text-base font-semibold transition"
                    disabled>Play</button>
                <button id="reRecordBtn"
                    class="bg-yellow-400 text-gray-900 px-3 py-2 md:px-4 md:py-2 rounded text-sm md:text-base font-semibold transition"
                    disabled>Re-record</button>
            </div>
            <audio id="audioPlayback" class="w-full mt-2" controls style="display:none;"></audio>
        </div>
        <button id="submitBtn"
            class="primary-bg text-white px-4 md:px-8 py-2.5 md:py-3 rounded-lg font-semibold text-base md:text-lg transition w-full mt-2"
            disabled>Submit Recording</button>
        <button id="saveProgressBtn"
            class="bg-gray-600 text-white px-4 md:px-8 py-2.5 md:py-3 rounded-lg font-semibold text-base md:text-lg transition w-full mt-2"
            disabled>Save Progress</button>

        <div id="uploadMsg" class="mt-4 text-sm md:text-base text-green-700 font-semibold hidden"></div>
        <div id="completionButtons" class="mt-4 flex flex-col sm:flex-row gap-3 md:gap-4 w-full hidden">
            <button id="dashboardBtn"
                class="bg-blue-600 text-white px-4 md:px-6 py-2.5 md:py-3 rounded-lg text-sm md:text-base font-semibold transition flex-1">Continue
                to Dashboard</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/video_recorder.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Check if this is a retake
        const urlParams = new URLSearchParams(window.location.search);
        const isRetake = urlParams.get('retake') === 'true';

        if (isRetake) {
            // Show a notification that this is a retake
            const notificationDiv = document.createElement('div');
            notificationDiv.className = 'bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mb-4';
            notificationDiv.innerHTML = `
                <p class="font-bold">Retake Mode</p>
                <p>You are retaking this task. Your previous submission has been preserved.</p>
            `;

            // Insert at the top of the main content area
            const contentWrapper = document.querySelector('.content-wrapper');
            if (contentWrapper) {
                contentWrapper.insertBefore(notificationDiv, contentWrapper.firstChild);
            }
        }

        // Initialize Video Monitor
        VideoRecorder.init('videoPreview').then(success => {
            if (!success) {
                const videoPreview = document.getElementById('videoPreview');
                if (videoPreview && videoPreview.parentElement) {
                    const errorOverlay = document.createElement('div');
                    errorOverlay.className = 'absolute inset-0 flex flex-col items-center justify-center bg-gray-900 bg-opacity-95 text-white p-4 text-center z-20';
                    errorOverlay.innerHTML = `
                        <svg class="h-10 w-10 text-red-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <div class="text-red-400 font-bold mb-1">Camera Not Available</div>
                        <div class="text-xs text-gray-300">Please ensure you are using HTTPS or localhost.<br>Task will proceed without video.</div>
                     `;
                    videoPreview.parentElement.appendChild(errorOverlay);
                    videoPreview.style.display = 'none';
                }
                return;
            }

            // Setup Toggle Buttons
            const toggleMicBtn = document.getElementById('toggleMicBtn');
            const toggleCamBtn = document.getElementById('toggleCamBtn');
            const micIconOn = document.getElementById('micIconOn');
            const micIconOff = document.getElementById('micIconOff');
            const camIconOn = document.getElementById('camIconOn');
            const camIconOff = document.getElementById('camIconOff');

            toggleMicBtn.addEventListener('click', () => {
                const isEnabled = VideoRecorder.toggleAudio();
                if (isEnabled) {
                    micIconOn.classList.remove('hidden');
                    micIconOff.classList.add('hidden');
                    toggleMicBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
                    toggleMicBtn.classList.add('bg-gray-700', 'hover:bg-gray-600');
                } else {
                    micIconOn.classList.add('hidden');
                    micIconOff.classList.remove('hidden');
                    toggleMicBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    toggleMicBtn.classList.add('bg-red-600', 'hover:bg-red-700');
                }
            });

            toggleCamBtn.addEventListener('click', () => {
                const isEnabled = VideoRecorder.toggleVideo();
                if (isEnabled) {
                    camIconOn.classList.remove('hidden');
                    camIconOff.classList.add('hidden');
                    toggleCamBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
                    toggleCamBtn.classList.add('bg-gray-700', 'hover:bg-gray-600');
                } else {
                    camIconOn.classList.add('hidden');
                    camIconOff.classList.remove('hidden');
                    toggleCamBtn.classList.remove('bg-gray-700', 'hover:bg-gray-600');
                    toggleCamBtn.classList.add('bg-red-600', 'hover:bg-red-700');
                }
            });
        });

        // Load reading content
        loadReadingContent();

        // Check task status and load progress
        checkTaskStatusAndLoadProgress();
    });

    function checkTaskStatusAndLoadProgress() {
        // Wait for currentTask to be loaded before making API calls
        if (!currentTask) {
            console.log('Waiting for currentTask to load...');
            setTimeout(checkTaskStatusAndLoadProgress, 100);
            return;
        }

        console.log('Current task loaded:', currentTask);

        // First check if task is already completed (but allow retakes)
        const urlParams = new URLSearchParams(window.location.search);
        const isRetake = urlParams.get('retake') === 'true';

        if (!isRetake) {
            // Only check completion status if not in retake mode
            fetch('/api/user-tasks')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const task = data.tasks.find(t => t.task_name === 'Reading Aloud Task 1');
                        if (task && task.status === 'Completed') {
                            alert('This task has already been completed. Redirecting to dashboard.');
                            window.location.href = '/participant-dashboard';
                            return;
                        }
                    }
                })
                .catch(() => {
                    console.log('Could not check task status');
                });
        }

        // Check for saved progress (always check, even in retake mode)
        fetch('/api/get-saved-progress?task_name=Reading Aloud Task 1')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.saved_audio) {
                    // Load saved audio
                    loadSavedAudio(data.saved_audio);
                    // Show attempt info if available
                    if (data.attempt_number) {
                        console.log(`Loading attempt ${data.attempt_number} for ${currentTask.task_name}`);
                    }
                }
            })
            .catch(() => {
                console.log('Could not check for saved progress');
            });
    }

    function loadSavedAudio(audioUrl) {
        // Create audio element and load the saved recording
        const audio = new Audio(audioUrl);
        audio.onloadeddata = function () {
            // Convert audio to blob for consistency
            fetch(audioUrl)
                .then(res => res.blob())
                .then(blob => {
                    audioBlob = blob;
                    // Enable buttons since we have saved audio
                    submitBtn.disabled = false;
                    saveProgressBtn.disabled = false;
                    playBtn.disabled = false;
                    reRecordBtn.disabled = false;

                    // Show message that saved progress was loaded
                    uploadMsg.textContent = 'Saved progress loaded successfully!';
                    uploadMsg.classList.remove('hidden');
                    uploadMsg.classList.remove('text-red-600');
                    uploadMsg.classList.add('text-green-600');
                    setTimeout(() => {
                        uploadMsg.classList.add('hidden');
                    }, 3000);
                });
        };
    }

    // --- Reading Content Loading Logic ---
    let currentTaskId = null;
    let currentTask = null;

    function loadReadingContent() {
        // Get task ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        currentTaskId = urlParams.get('task_id');

        if (!currentTaskId) {
            showError('No task selected. Please go back and select a reading task.');
            return;
        }

        // Fetch the reading task content
        fetch(`/api/reading-task/${currentTaskId}`)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    currentTask = data.task;
                    displayReadingContent(data.task);
                } else {
                    showError('Failed to load reading task: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error loading reading task:', error);
                showError('Failed to load reading task. Please try again.');
            });
    }

    function displayReadingContent(task) {
        const contentDiv = document.getElementById('readingContent');

        // Update the title to show the task name
        const titleElement = document.querySelector('h2');
        if (titleElement) {
            titleElement.textContent = task.task_name;
        }

        // Display the reading content
        contentDiv.innerHTML = `
            <div class="space-y-4">
                <div class="bg-white p-4 rounded border border-gray-200">
                    <h3 class="font-semibold text-gray-700 mb-2">Instructions:</h3>
                    <p class="text-gray-600">${task.instructions}</p>
                </div>
                <div class="bg-white p-4 rounded border border-gray-200">
                    <h3 class="font-semibold text-gray-700 mb-2">${task.task_name}</h3>
                    <div class="text-gray-800 leading-relaxed whitespace-pre-wrap">${task.content}</div>
                </div>
                <div class="bg-gray-100 p-3 rounded text-sm text-gray-600">
                <strong>Estimated Time:</strong> ${task.estimated_time} minutes
                </div>
            </div>
        `;
    }

    function showError(message) {
        const contentDiv = document.getElementById('readingContent');
        contentDiv.innerHTML = `
            <div class="text-center py-8">
                <div class="text-red-600 text-6xl mb-4">⚠️</div>
                <h3 class="text-xl font-bold text-red-800 mb-2">Error Loading Task</h3>
                <p class="text-red-600 mb-4">${message}</p>
                <button onclick="window.location.href='/task1.html'" 
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    Back to Reading Tasks
                </button>
            </div>
        `;
    }

    // --- Audio Recording Logic ---
    let mediaRecorder, audioChunks = [], audioBlob;
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const playBtn = document.getElementById('playBtn');
    const reRecordBtn = document.getElementById('reRecordBtn');
    const submitBtn = document.getElementById('submitBtn');
    const saveProgressBtn = document.getElementById('saveProgressBtn');
    const audioPlayback = document.getElementById('audioPlayback');
    const recStatus = document.getElementById('recStatus');
    const recordingDot = document.getElementById('recording-dot');
    const uploadMsg = document.getElementById('uploadMsg');

    function resetUI() {
        playBtn.disabled = true;
        reRecordBtn.disabled = true;
        submitBtn.disabled = true;
        audioPlayback.style.display = 'none';
        audioPlayback.src = '';
        recStatus.textContent = '';
        recordingDot.classList.add('hidden');
    }

    recordBtn.onclick = async function () {
        resetUI();
        audioChunks = [];
        recStatus.textContent = 'Recording...';
        recordingDot.classList.remove('hidden');
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();

            // Start Video Recording
            VideoRecorder.start();

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                audioPlayback.src = URL.createObjectURL(audioBlob);
                audioPlayback.style.display = 'block';
                playBtn.disabled = false;
                reRecordBtn.disabled = false;
                submitBtn.disabled = false;
                recStatus.textContent = 'Recording complete.';
                recordingDot.classList.add('hidden');
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            };
        } catch (err) {
            recStatus.textContent = 'Microphone access denied.';
            recordingDot.classList.add('hidden');
            recordBtn.disabled = false;
            stopBtn.disabled = true;
        }
    };

    stopBtn.onclick = async function () {
        if (mediaRecorder) mediaRecorder.stop();

        // Stop Video Recording and Upload
        // We use the currentTaskId and a hardcoded name/ID. 
        // Note: stopAndUpload is async, but we don't strictly need to wait for it to re-enable UI, 
        // though it might be better to show status.
        if (currentTaskId) {
            VideoRecorder.stopAndUpload(currentTaskId, 'Reading Aloud Task 1');
        }
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        playBtn.disabled = false;
        reRecordBtn.disabled = false;
        submitBtn.disabled = false;
        saveProgressBtn.disabled = false;
    };

    playBtn.onclick = function () {
        audioPlayback.play();
    };

    reRecordBtn.onclick = function () {
        resetUI();
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        recStatus.textContent = '';
    };

    submitBtn.onclick = function () {
        if (!audioBlob) return;
        submitBtn.disabled = true;
        uploadMsg.classList.add('hidden');
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        // Add task information to form data - always use "Reading Aloud Task 1" for the main task
        formData.append('task_name', 'Reading Aloud Task 1');
        // Pass the specific reading task ID so backend knows which text to compare against
        if (currentTaskId) {
            formData.append('reading_task_id', currentTaskId);
        }

        fetch('/api/handle-audio-upload', {
            method: 'POST',
            body: formData
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    uploadMsg.textContent = 'Recording submitted successfully! Task completed.';
                    uploadMsg.classList.remove('hidden');
                    uploadMsg.classList.remove('text-red-600');
                    uploadMsg.classList.add('text-green-600');

                    // Trigger Feedback Modal, passing the stats if available
                    showFeedbackModal('Reading Aloud Task 1', () => {
                        // Show completion buttons after feedback loop
                        document.getElementById('completionButtons').classList.remove('hidden');
                    }, data.stats);

                    // Disable all recording controls
                    recordBtn.disabled = true;
                    stopBtn.disabled = true;
                    playBtn.disabled = true;
                    reRecordBtn.disabled = true;
                    submitBtn.disabled = true;
                } else {
                    uploadMsg.textContent = 'Upload failed: ' + (data.message || 'Unknown error');
                    uploadMsg.classList.remove('hidden');
                    uploadMsg.classList.add('text-red-600');
                }
                submitBtn.disabled = false;
            })
            .catch(() => {
                uploadMsg.textContent = 'Upload failed. Please try again.';
                uploadMsg.classList.remove('hidden');
                uploadMsg.classList.add('text-red-600');
                submitBtn.disabled = false;
            });
    };

    // Save Progress button logic
    saveProgressBtn.onclick = function () {
        if (!audioBlob) return;
        saveProgressBtn.disabled = true;
        uploadMsg.classList.add('hidden');
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        formData.append('save_progress', 'true'); // Flag to indicate this is a save, not submit
        // Add task information to form data - always use "Reading Aloud Task 1" for the main task
        formData.append('task_name', 'Reading Aloud Task 1');
        fetch('/api/save-progress', {
            method: 'POST',
            body: formData
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    uploadMsg.textContent = 'Progress saved successfully! Redirecting to dashboard...';
                    uploadMsg.classList.remove('hidden');
                    uploadMsg.classList.remove('text-red-600');
                    uploadMsg.classList.add('text-green-600');
                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/participant-dashboard';
                    }, 2000);
                } else {
                    uploadMsg.textContent = 'Save failed: ' + (data.message || 'Unknown error');
                    uploadMsg.classList.remove('hidden');
                    uploadMsg.classList.add('text-red-600');
                }
                saveProgressBtn.disabled = false;
            })
            .catch(() => {
                uploadMsg.textContent = 'Save failed. Please try again.';
                uploadMsg.classList.remove('hidden');
                uploadMsg.classList.add('text-red-600');
                saveProgressBtn.disabled = false;
            });
    };

    // Completion button event listeners
    document.getElementById('dashboardBtn').addEventListener('click', function () {
        window.location.href = '/participant-dashboard';
    });
</script>
{% endblock %}
{% block footer %}{% endblock %}
