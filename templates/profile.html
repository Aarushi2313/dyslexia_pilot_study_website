<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Dashboard - Dyslexia Research Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='landing_style.css') }}">
</head>

<body>
    <!-- Header -->
    <header class="primary-bg text-white py-6">
        <div class="content-wrapper flex justify-between items-center">
            <div class="flex items-center">
                <img src="{{ url_for('static', filename='profile.jpg') }}" alt="Dashboard Graphic"
                    class="h-12 w-12 rounded-full mr-4 hidden md:block">
                <h1 class="text-xl md:text-2xl font-bold">Welcome to Your Profile, Captain!</h1>
            </div>
            <nav>
                <ul class="flex space-x-6 text-lg md:text-xl items-center">
                    <li><a href="{{ url_for('landing') }}#about" class="hover:text-yellow-100 transition">About</a></li>
                    <li><a href="{{ url_for('landing') }}#contact" class="hover:text-yellow-100 transition">Contact</a>
                    </li>
                    <li><a href="/participant-dashboard" class="hover:text-yellow-100 transition ">Dashboard</a></li>
                    <li><a href="#" id="logoutBtn" class="hover:text-yellow-100 transition ">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Accessibility Button with Label -->
    <div class="fixed bottom-4 left-4 z-50 flex flex-col items-center space-y-1">
        <button id="togglePanel"
            class="bg-[#1A237E] text-white p-3 rounded-full shadow-lg hover:bg-[#3a74cc] transition border border-white"
            aria-label="Toggle Accessibility Panel">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 4.5c.828 0 1.5-.672 1.5-1.5S12.828 1.5 12 1.5 10.5 2.172 10.5 3s.672 1.5 1.5 1.5zM4.75 9.25l3.625.75M19.25 9.25l-3.625.75M8.375 10l.625 9m6-9l-.625 9M5.5 21.25h13" />
            </svg>
        </button>
        <span class="text-sm text-white bg-[#1A237E] px-2 py-1 rounded shadow border border-white">
            Accessibility
        </span>
    </div>

    <!-- Reading ruler -->
    <div id="readingRuler" class="hidden pointer-events-none fixed top-0 left-0 w-full h-10 z-40"
        style="background-color: rgba(58, 116, 204, 0.3);">
    </div>

    <!-- Accessibility Panel -->
    <div id="accessibilityPanel"
        class="hidden fixed top-0 left-0 h-screen w-80 bg-white shadow-lg z-50 border-l border-gray-300 overflow-y-auto p-4 space-y-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-[#1A237E]">Accessibility Menu</h2>
            <button id="closePanel" class="text-2xl font-bold text-gray-500 hover:text-gray-700">&times;</button>
        </div>

        <div class="flex items-center justify-between">
            <span>Font Size</span>
            <div class="space-x-2">
                <button id="fontDecrease" class="px-2 py-1 bg-gray-200 rounded">A-</button>
                <button id="fontReset" class="px-2 py-1 bg-gray-200 rounded">Reset</button>
                <button id="fontIncrease" class="px-2 py-1 bg-gray-200 rounded">A+</button>
            </div>
        </div>

        <div class="flex justify-between items-center">
            <span>Dyslexic Font</span>
            <button id="toggleDyslexic"
                class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-300 transition-colors">
                <span
                    class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
            </button>
        </div>

        <div class="flex justify-between items-center">
            <span>Monochrome</span>
            <button id="toggleMonochrome"
                class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-300 transition-colors">
                <span
                    class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
            </button>
        </div>

        <div class="flex justify-between items-center">
            <span>Reading Ruler</span>
            <button id="toggleRuler"
                class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-300 transition-colors">
                <span
                    class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
            </button>
        </div>

        <div class="flex justify-between items-center">
            <span>Big Cursor</span>
            <button id="toggleCursor"
                class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-300 transition-colors">
                <span
                    class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
            </button>
        </div>
    </div>

    <div class="content-wrapper mt-8 mb-16">
        <div class="max-w-lg mx-auto bg-white rounded-xl shadow-md p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Edit Profile</h2>
            <form id="profileForm" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" id="name" name="name" value="{{ user.name }}"
                        class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue"
                        required>
                    <div id="nameError" class="error-message hidden"></div>
                </div>
                <!-- Email field removed -->

                <div>
                    <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="current_password" name="current_password"
                            class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue pr-10">
                        <button type="button"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-800 focus:outline-none toggle-password"
                            data-target="current_password">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-eye" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-eye-off hidden" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password"
                            class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue pr-10">
                        <button type="button"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-800 focus:outline-none toggle-password"
                            data-target="password">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-eye" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-eye-off hidden" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm New
                        Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue pr-10">
                        <button type="button"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-800 focus:outline-none toggle-password"
                            data-target="confirmPassword">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-eye" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-eye-off hidden" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                    <div id="passwordError" class="error-message hidden"></div>
                </div>
                <div>
                    <label for="date_of_birth" class="block text-sm font-medium text-gray-700 mb-1">Date of
                        Birth</label>
                    <input type="date" id="date_of_birth" name="date_of_birth"
                        value="{{ user.date_of_birth if user.date_of_birth else '' }}"
                        class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue">
                </div>
                <div>
                    <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
                    <select id="gender" name="gender"
                        class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue">
                        <option value="" disabled {% if not user.gender %}selected{% endif %}>Select your gender
                        </option>
                        <option value="female" {% if user.gender=='female' %}selected{% endif %}>Female</option>
                        <option value="male" {% if user.gender=='male' %}selected{% endif %}>Male</option>
                        <option value="nonbinary" {% if user.gender=='nonbinary' %}selected{% endif %}>Non-binary
                        </option>
                        <option value="prefer_not_to_say" {% if user.gender=='prefer_not_to_say' %}selected{% endif %}>
                            Prefer not to say</option>
                        <option value="other" {% if user.gender=='other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div>
                    <label for="native_language" class="block text-sm font-medium text-gray-700 mb-1">Native
                        Language(s)</label>
                    <select id="native_language" name="native_language"
                        class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue">
                        <option value="" disabled {% if not user.native_language %}selected{% endif %}>Select your
                            native language</option>
                        <option value="Assamese" {% if user.native_language=='Assamese' %}selected{% endif %}>Assamese
                        </option>
                        <option value="Bengali" {% if user.native_language=='Bengali' %}selected{% endif %}>Bengali
                        </option>
                        <option value="Bodo" {% if user.native_language=='Bodo' %}selected{% endif %}>Bodo</option>
                        <option value="Dogri" {% if user.native_language=='Dogri' %}selected{% endif %}>Dogri</option>
                        <option value="English" {% if user.native_language=='English' %}selected{% endif %}>English
                        </option>
                        <option value="Gujarati" {% if user.native_language=='Gujarati' %}selected{% endif %}>Gujarati
                        </option>
                        <option value="Hindi" {% if user.native_language=='Hindi' %}selected{% endif %}>Hindi</option>
                        <option value="Kannada" {% if user.native_language=='Kannada' %}selected{% endif %}>Kannada
                        </option>
                        <option value="Kashmiri" {% if user.native_language=='Kashmiri' %}selected{% endif %}>Kashmiri
                        </option>
                        <option value="Konkani" {% if user.native_language=='Konkani' %}selected{% endif %}>Konkani
                        </option>
                        <option value="Maithili" {% if user.native_language=='Maithili' %}selected{% endif %}>Maithili
                        </option>
                        <option value="Malayalam" {% if user.native_language=='Malayalam' %}selected{% endif %}>
                            Malayalam</option>
                        <option value="Marathi" {% if user.native_language=='Marathi' %}selected{% endif %}>Marathi
                        </option>
                        <option value="Meitei" {% if user.native_language=='Meitei' %}selected{% endif %}>Meitei
                        </option>
                        <option value="Nepali" {% if user.native_language=='Nepali' %}selected{% endif %}>Nepali
                        </option>
                        <option value="Odia" {% if user.native_language=='Odia' %}selected{% endif %}>Odia</option>
                        <option value="Punjabi" {% if user.native_language=='Punjabi' %}selected{% endif %}>Punjabi
                        </option>
                        <option value="Sanskrit" {% if user.native_language=='Sanskrit' %}selected{% endif %}>Sanskrit
                        </option>
                        <option value="Santali" {% if user.native_language=='Santali' %}selected{% endif %}>Santali
                        </option>
                        <option value="Sindhi" {% if user.native_language=='Sindhi' %}selected{% endif %}>Sindhi
                        </option>
                        <option value="Tamil" {% if user.native_language=='Tamil' %}selected{% endif %}>Tamil</option>
                        <option value="Telugu" {% if user.native_language=='Telugu' %}selected{% endif %}>Telugu
                        </option>
                        <option value="Urdu" {% if user.native_language=='Urdu' %}selected{% endif %}>Urdu</option>
                        <option value="Other" {% if user.native_language and user.native_language not in
                            ['Assamese', 'Bengali' , 'Bodo' , 'Dogri' , 'English' , 'Gujarati' , 'Hindi' , 'Kannada'
                            , 'Kashmiri' , 'Konkani' , 'Maithili' , 'Malayalam' , 'Marathi' , 'Meitei' , 'Nepali'
                            , 'Odia' , 'Punjabi' , 'Sanskrit' , 'Santali' , 'Sindhi' , 'Tamil' , 'Telugu' , 'Urdu' ]
                            %}selected{% endif %}>Other (specify below)</option>
                    </select>
                    <input type="text" id="native_language_other" name="native_language_other"
                        placeholder="Please specify your native language"
                        value="{% if user.native_language and user.native_language not in ['Assamese', 'Bengali', 'Bodo', 'Dogri', 'English', 'Gujarati', 'Hindi', 'Kannada', 'Kashmiri', 'Konkani', 'Maithili', 'Malayalam', 'Marathi', 'Meitei', 'Nepali', 'Odia', 'Punjabi', 'Sanskrit', 'Santali', 'Sindhi', 'Tamil', 'Telugu', 'Urdu'] %}{{ user.native_language }}{% endif %}"
                        class="hidden w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue mt-2">
                </div>
                <div>
                    <label for="education_level" class="block text-sm font-medium text-gray-700 mb-1">Class
                        Level</label>
                    <select id="education_level" name="education_level"
                        class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue">
                        <option value="" disabled {% if not user.education_level %}selected{% endif %}>Select your class
                        </option>
                        <option value="1" {% if user.education_level=='1' %}selected{% endif %}>Class 1</option>
                        <option value="2" {% if user.education_level=='2' %}selected{% endif %}>Class 2</option>
                        <option value="3" {% if user.education_level=='3' %}selected{% endif %}>Class 3</option>
                        <option value="4" {% if user.education_level=='4' %}selected{% endif %}>Class 4</option>
                        <option value="5" {% if user.education_level=='5' %}selected{% endif %}>Class 5</option>
                        <option value="6" {% if user.education_level=='6' %}selected{% endif %}>Class 6</option>
                        <option value="7" {% if user.education_level=='7' %}selected{% endif %}>Class 7</option>
                        <option value="8" {% if user.education_level=='8' %}selected{% endif %}>Class 8</option>
                        <option value="9" {% if user.education_level=='9' %}selected{% endif %}>Class 9</option>
                        <option value="10" {% if user.education_level=='10' %}selected{% endif %}>Class 10</option>
                        <option value="11" {% if user.education_level=='11' %}selected{% endif %}>Class 11</option>
                        <option value="12" {% if user.education_level=='12' %}selected{% endif %}>Class 12</option>
                    </select>
                </div>
                <div>
                    <label for="dyslexia_status" class="block text-sm font-medium text-gray-700 mb-1">Self-reported
                        Dyslexia Status</label>
                    <select id="dyslexia_status" name="dyslexia_status"
                        class="w-full px-4 py-2 border-2 border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-blue">
                        <option value="" disabled {% if not user.dyslexia_status %}selected{% endif %}>Select one
                        </option>
                        <option value="diagnosed" {% if user.dyslexia_status=='diagnosed' %}selected{% endif %}>
                            Diagnosed with dyslexia</option>
                        <option value="suspected" {% if user.dyslexia_status=='suspected' %}selected{% endif %}>Suspect
                            I have dyslexia</option>
                        <option value="control" {% if user.dyslexia_status=='control' %}selected{% endif %}>No dyslexia
                            (control)</option>
                        <option value="prefer_not_to_say" {% if user.dyslexia_status=='prefer_not_to_say' %}selected{%
                            endif %}>Prefer not to say</option>
                    </select>
                </div>
                <div class="flex justify-center">
                    <button type="submit"
                        class="primary-bg hover:bg-blue-600 text-white font-medium py-2 px-6 rounded-md transition">Save
                        Changes</button>
                </div>
                <div id="profileSuccess" class="text-green-600 text-center mt-2 hidden"></div>
                <div id="profileError" class="text-red-600 text-center mt-2 hidden"></div>
            </form>
        </div>
    </div>


    <script>
        // Accessibility functionality
        const root = document.documentElement;
        const panel = document.getElementById('accessibilityPanel');
        const panelToggle = document.getElementById('togglePanel');
        const closePanel = document.getElementById('closePanel');
        const decreaseBtn = document.getElementById('fontDecrease');
        const resetBtn = document.getElementById('fontReset');
        const increaseBtn = document.getElementById('fontIncrease');

        panelToggle.addEventListener('click', () => {
            panel.classList.toggle('hidden');
        });

        closePanel.addEventListener('click', () => {
            panel.classList.add('hidden');
        });

        document.addEventListener('click', function (event) {
            const isClickInsidePanel = panel.contains(event.target);
            const isClickToggleButton = panelToggle.contains(event.target);

            if (!isClickInsidePanel && !isClickToggleButton) {
                panel.classList.add('hidden');
            }
        });

        function setupToggle(buttonId, classTarget, className) {
            const button = document.getElementById(buttonId);
            const thumb = button.querySelector('span');

            button.addEventListener('click', () => {
                const isActive = classTarget.classList.toggle(className);
                button.classList.toggle('bg-blue-600', isActive);
                button.classList.toggle('bg-gray-300', !isActive);
                thumb.classList.toggle('translate-x-6', isActive);
                thumb.classList.toggle('translate-x-1', !isActive);
            });
        }

        setupToggle('toggleDyslexic', root, 'dyslexic-font');
        setupToggle('toggleMonochrome', root, 'monochrome');
        setupToggle('toggleCursor', root, 'big-cursor');

        // Reading ruler
        const ruler = document.getElementById('readingRuler');
        const rulerToggle = document.getElementById('toggleRuler');
        const rulerThumb = rulerToggle.querySelector('span');
        let rulerActive = false;

        rulerToggle.addEventListener('click', () => {
            rulerActive = !rulerActive;
            ruler.classList.toggle('hidden', !rulerActive);
            rulerToggle.classList.toggle('bg-blue-600', rulerActive);
            rulerToggle.classList.toggle('bg-gray-300', !rulerActive);
            rulerThumb.classList.toggle('translate-x-6', rulerActive);
            rulerThumb.classList.toggle('translate-x-1', !rulerActive);
        });

        document.addEventListener('mousemove', (e) => {
            if (rulerActive) {
                const height = ruler.offsetHeight;
                ruler.style.top = `${e.clientY - height / 2}px`;
            }
        });

        // Font size controls
        let currentFontSize = 16;
        decreaseBtn.addEventListener('click', () => {
            if (currentFontSize > 12) {
                currentFontSize -= 1;
                updateFontSize();
            }
        });
        resetBtn.addEventListener('click', () => {
            currentFontSize = 16;
            updateFontSize();
        });
        increaseBtn.addEventListener('click', () => {
            if (currentFontSize < 24) {
                currentFontSize += 1;
                updateFontSize();
            }
        });

        function updateFontSize() {
            document.documentElement.style.setProperty('--font-size-base', `${currentFontSize}px`);
            document.body.style.fontSize = `${currentFontSize}px`;
            root.style.fontSize = `${currentFontSize}px`;
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function () {
            fetch('/api/logout', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' }
            })
                .then(res => res.json())
                .then(data => {
                    localStorage.clear();
                    window.location.href = '/';
                })
                .catch(() => {
                    localStorage.clear();
                    window.location.href = '/';
                });
        });

        // Password Toggle Functionality
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const iconEye = this.querySelector('.icon-eye');
                const iconEyeOff = this.querySelector('.icon-eye-off');

                if (input.type === 'password') {
                    input.type = 'text';
                    iconEye.classList.add('hidden');
                    iconEyeOff.classList.remove('hidden');
                } else {
                    input.type = 'password';
                    iconEye.classList.remove('hidden');
                    iconEyeOff.classList.add('hidden');
                }
            });
        });

        // Native Language "Other" functionality
        const nativeLanguageSelect = document.getElementById('native_language');
        const nativeLanguageOther = document.getElementById('native_language_other');

        if (nativeLanguageSelect) {
            nativeLanguageSelect.addEventListener('change', function () {
                if (this.value === 'Other') {
                    nativeLanguageOther.classList.remove('hidden');
                    nativeLanguageOther.required = true;
                } else {
                    nativeLanguageOther.classList.add('hidden');
                    nativeLanguageOther.required = false;
                    nativeLanguageOther.value = '';
                }
            });
        }

        document.getElementById('profileForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            // Email removed
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const date_of_birth = document.getElementById('date_of_birth').value;
            const gender = document.getElementById('gender').value;

            let native_language = document.getElementById('native_language').value;
            if (native_language === 'Other') {
                native_language = document.getElementById('native_language_other').value.trim();
            }

            const education_level = document.getElementById('education_level').value;
            const dyslexia_status = document.getElementById('dyslexia_status').value;
            const successMsg = document.getElementById('profileSuccess');
            const errorMsg = document.getElementById('profileError');
            const passwordError = document.getElementById('passwordError');

            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
            passwordError.classList.add('hidden');

            if (password && password !== confirmPassword) {
                passwordError.textContent = 'Passwords do not match.';
                passwordError.classList.remove('hidden');
                return;
            }

            fetch('/api/profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    // email removed
                    password,
                    date_of_birth,
                    gender,
                    native_language,
                    education_level,
                    dyslexia_status
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        successMsg.textContent = 'Profile updated successfully!';
                        successMsg.classList.remove('hidden');
                    } else {
                        errorMsg.textContent = data.message || 'Failed to update profile.';
                        errorMsg.classList.remove('hidden');
                    }
                })
                .catch(() => {
                    errorMsg.textContent = 'Failed to update profile.';
                    errorMsg.classList.remove('hidden');
                });
        });

    </script>
</body>

</html>
