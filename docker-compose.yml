services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Mount uploads directory to persist uploaded files
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - PORT=5000
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Health check to ensure the app is running
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
